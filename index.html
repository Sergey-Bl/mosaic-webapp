<!DOCTYPE html>
<html lang="en-us">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="mobile-web-app-capable" content="yes">
  <title>Mosaic — Jigsaw Puzzles</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; overflow: hidden; background: #EEF4F1; }
    #unity-canvas { width: 100%; height: 100%; display: block; }
    #loading { position: absolute; inset: 0; display: flex; flex-direction: column;
               justify-content: center; align-items: center; background: #EEF4F1; z-index: 10; }
    #loading h1 { color: #3FB76B; font-size: 48px; letter-spacing: 8px; font-family: -apple-system, sans-serif; }
    #loading p { color: #6B7872; margin-top: 16px; font-size: 18px; font-family: -apple-system, sans-serif; }
    .bar-bg { margin-top: 32px; width: 240px; height: 8px; background: #D3DAD6; border-radius: 4px; overflow: hidden; }
    .bar-fill { width: 0%; height: 100%; background: #3FB76B; border-radius: 4px; transition: width 0.3s ease; }
    #pct { color: #3FB76B; font-size: 22px; font-weight: bold; margin-top: 14px; font-family: -apple-system, sans-serif; }
    #size-info { color: #9CA8A0; font-size: 13px; margin-top: 6px; font-family: -apple-system, sans-serif; }
  </style>
</head>
<body>
  <div id="loading">
    <h1>MOSAIC</h1>
    <p>Loading puzzles...</p>
    <div class="bar-bg"><div class="bar-fill" id="bar"></div></div>
    <div id="pct">0%</div>
    <div id="size-info">~37 MB</div>
  </div>
  <canvas id="unity-canvas" tabindex="-1"></canvas>
  <script>
    var canvas = document.getElementById("unity-canvas");
    var bar = document.getElementById("bar");
    var pctEl = document.getElementById("pct");
    var sizeEl = document.getElementById("size-info");
    var loadingP = document.querySelector("#loading p");

    // Telegram
    var tg = window.Telegram?.WebApp;
    if (tg) {
      tg.expand();
      tg.ready();
      try { tg.disableVerticalSwipes(); } catch(e) {}
    }

    // Load Unity with progress
    var script = document.createElement("script");
    script.src = "Build/WebGLBuild.loader.js";
    script.onload = function() {
      createUnityInstance(canvas, {
        dataUrl: "Build/WebGLBuild.data",
        frameworkUrl: "Build/WebGLBuild.framework.js",
        codeUrl: "Build/WebGLBuild.wasm",
        streamingAssetsUrl: "StreamingAssets",
        companyName: "Sergey Blotskiy",
        productName: "Mosaic",
        matchWebGLToCanvasSize: true,
        devicePixelRatio: window.devicePixelRatio || 1,
        onProgress: function(progress) {
          var p = Math.round(progress * 100);
          bar.style.width = p + "%";
          pctEl.textContent = p + "%";
          if (p < 30) loadingP.textContent = "Downloading engine...";
          else if (p < 70) loadingP.textContent = "Loading assets...";
          else if (p < 100) loadingP.textContent = "Almost ready...";
          else loadingP.textContent = "Starting game!";
          var loaded = Math.round(progress * 37);
          sizeEl.textContent = loaded + " / 37 MB";
        },
      }).then(function(instance) {
        document.getElementById("loading").style.display = "none";
      }).catch(function(err) {
        loadingP.textContent = err.message || "Error loading game";
        bar.style.background = "#E15452";
        pctEl.textContent = "";
      });
    };
    document.body.appendChild(script);
  </script>
</body>
</html>
