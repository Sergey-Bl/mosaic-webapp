<!DOCTYPE html>
<html lang="en-us">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="mobile-web-app-capable" content="yes">
  <title>Mosaic — Jigsaw Puzzles</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; overflow: hidden; background: #EEF4F1; }
    #unity-canvas { width: 100%; height: 100%; display: block; }
    #loading { position: absolute; inset: 0; display: flex; flex-direction: column;
               justify-content: center; align-items: center; background: #EEF4F1; z-index: 10; }
    #loading h1 { color: #3FB76B; font-size: 48px; letter-spacing: 8px; font-family: -apple-system, sans-serif; }
    #loading p { color: #6B7872; margin-top: 12px; font-size: 16px; font-family: -apple-system, sans-serif; }
    .spinner { margin-top: 30px; width: 40px; height: 40px; border: 3px solid #D3DAD6;
               border-top: 3px solid #3FB76B; border-radius: 50%; animation: spin 0.8s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div id="loading">
    <h1>MOSAIC</h1>
    <p>Loading puzzles...</p>
    <div class="spinner"></div>
  </div>
  <canvas id="unity-canvas" tabindex="-1"></canvas>
  <script>
    // Get canvas FIRST before anything else
    var canvas = document.getElementById("unity-canvas");

    // Telegram Mini App
    var tg = window.Telegram?.WebApp;
    if (tg) {
      tg.expand();
      tg.ready();
      try { tg.disableVerticalSwipes(); } catch(e) {}
    }

    // Load Unity
    var script = document.createElement("script");
    script.src = "Build/WebGLBuild.loader.js";
    script.onload = function() {
      createUnityInstance(canvas, {
        dataUrl: "Build/WebGLBuild.data",
        frameworkUrl: "Build/WebGLBuild.framework.js",
        codeUrl: "Build/WebGLBuild.wasm",
        streamingAssetsUrl: "StreamingAssets",
        companyName: "Sergey Blotskiy",
        productName: "Mosaic",
        matchWebGLToCanvasSize: true,
        devicePixelRatio: window.devicePixelRatio || 1,
      }).then(function(instance) {
        document.getElementById("loading").style.display = "none";
      }).catch(function(err) {
        document.querySelector("#loading p").textContent = err.message || "Error";
        document.querySelector(".spinner").style.display = "none";
      });
    };
    document.body.appendChild(script);
  </script>
</body>
</html>
